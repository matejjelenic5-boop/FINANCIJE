<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>Troškovi</title>
<style>
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --card: #16213e;
    --accent: #e94560;
    --accent2: #0f3460;
    --text: #eaeaea;
    --muted: #8888aa;
    --border: #2a2a4a;
    --success: #4ecca3;
    --radius: 16px;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 80px;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--accent2), #0a1628);
    padding: 48px 20px 24px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0.08;
  }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .app-title { font-size: 13px; font-weight: 600; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .month-label { font-size: 22px; font-weight: 700; color: var(--text); margin-top: 4px; }
  .header-total { text-align: right; }
  .total-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .total-amount { font-size: 28px; font-weight: 800; color: var(--accent); line-height: 1; margin-top: 2px; }
  .total-amount span { font-size: 14px; font-weight: 500; color: var(--muted); }

  .month-nav { display: flex; align-items: center; gap: 12px; margin-top: 18px; }
  .month-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--border);
    color: var(--text);
    width: 36px; height: 36px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .month-btn:active { background: rgba(255,255,255,0.16); }
  .current-month { font-size: 16px; font-weight: 600; flex: 1; }

  /* SYNC STATUS */
  .sync-bar {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; padding: 6px 20px;
    font-size: 11px; color: var(--muted);
    border-bottom: 1px solid var(--border);
    min-height: 28px;
  }
  .sync-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0;
  }
  .sync-dot.ok { background: var(--success); }
  .sync-dot.err { background: var(--accent); }
  .sync-dot.loading { background: #f7b731; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* CATEGORY PILLS SUMMARY */
  .summary-scroll {
    overflow-x: auto;
    padding: 16px 20px;
    display: flex;
    gap: 10px;
    scrollbar-width: none;
  }
  .summary-scroll::-webkit-scrollbar { display: none; }
  .cat-pill {
    flex-shrink: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .cat-pill.active { border-color: var(--accent); background: rgba(233,69,96,0.12); }
  .cat-pill-icon { font-size: 18px; display: block; }
  .cat-pill-name { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; }
  .cat-pill-amount { font-size: 12px; font-weight: 700; color: var(--text); display: block; margin-top: 2px; }

  /* ADD BUTTON FAB */
  .fab {
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 60px; height: 60px;
    background: var(--accent);
    border: none;
    border-radius: 50%;
    font-size: 28px;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(233,69,96,0.5);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s;
  }
  .fab:active { transform: scale(0.92); }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 99;
  }
  .nav-item {
    flex: 1; padding: 12px 0;
    display: flex; flex-direction: column; align-items: center;
    gap: 3px; cursor: pointer; background: none; border: none;
    color: var(--muted); font-size: 10px; font-family: var(--font);
    letter-spacing: 0.5px; transition: color 0.15s;
  }
  .nav-item.active { color: var(--accent); }
  .nav-item svg { width: 22px; height: 22px; }

  /* MODAL OVERLAY */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: none;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(60px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; }

  /* FORM */
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; display: block; }
  .form-input {
    width: 100%; padding: 14px 16px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 16px;
    font-family: var(--font);
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--muted); }

  .amount-row { display: flex; gap: 8px; }
  .amount-row .form-input { flex: 1; }
  .currency-badge {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--muted);
    font-size: 16px;
    font-weight: 700;
    display: flex; align-items: center;
  }

  /* WHO PAID */
  .who-row { display: flex; gap: 10px; }
  .who-btn {
    flex: 1; padding: 12px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--muted);
    font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: var(--font);
    transition: all 0.15s;
    text-align: center;
  }
  .who-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(233,69,96,0.1); }

  /* CATEGORY GRID */
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .cat-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 6px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    font-family: var(--font);
  }
  .cat-btn:active { transform: scale(0.95); }
  .cat-btn.selected { border-color: var(--accent); background: rgba(233,69,96,0.12); }
  .cat-btn-icon { font-size: 22px; display: block; margin-bottom: 4px; }
  .cat-btn-name { font-size: 10px; color: var(--muted); font-weight: 600; line-height: 1.2; }
  .cat-btn.selected .cat-btn-name { color: var(--accent); }

  /* SUBMIT */
  .submit-btn {
    width: 100%; padding: 16px;
    background: var(--accent);
    border: none; border-radius: 14px;
    color: #fff; font-size: 16px; font-weight: 700;
    cursor: pointer; font-family: var(--font);
    margin-top: 8px;
    transition: opacity 0.15s, transform 0.1s;
  }
  .submit-btn:active { transform: scale(0.98); opacity: 0.9; }
  .submit-btn:disabled { opacity: 0.5; }

  /* EXPENSE LIST */
  .section-header {
    padding: 8px 20px 4px;
    font-size: 11px; font-weight: 600;
    color: var(--muted); letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .expense-item {
    margin: 0 16px 8px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer;
    transition: border-color 0.15s;
    position: relative;
  }
  .expense-item:active { border-color: var(--accent); }
  .expense-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .expense-info { flex: 1; min-width: 0; }
  .expense-desc { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .expense-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .expense-right { text-align: right; }
  .expense-amount { font-size: 16px; font-weight: 800; color: var(--text); }
  .expense-who { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .delete-btn {
    position: absolute; top: 8px; right: 8px;
    background: rgba(233,69,96,0.12);
    border: 1px solid rgba(233,69,96,0.3);
    border-radius: 8px;
    color: var(--accent);
    width: 28px; height: 28px;
    font-size: 14px; cursor: pointer;
    display: none; align-items: center; justify-content: center;
  }
  .expense-item.expanded .delete-btn { display: flex; }
  .expense-item.expanded { border-color: rgba(233,69,96,0.4); }

  /* STATS VIEW */
  .stats-view { padding: 0 16px; }
  .stats-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .stats-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .stats-cat-name { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; }
  .stats-amount { font-size: 15px; font-weight: 800; }
  .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s ease; }

  .person-split { display: flex; gap: 10px; margin-bottom: 16px; }
  .split-card {
    flex: 1; background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px; text-align: center;
  }
  .split-name { font-size: 12px; color: var(--muted); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
  .split-amount { font-size: 22px; font-weight: 800; margin-top: 4px; }
  .split-pct { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; line-height: 1.5; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: var(--success); color: #0a1628;
    padding: 10px 20px; border-radius: 24px;
    font-size: 14px; font-weight: 700;
    z-index: 999; opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  .view { display: none; }
  .view.active { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="app-title">Troškovi</div>
      <div class="month-label" id="headerMonth"></div>
    </div>
    <div class="header-total">
      <div class="total-label">Ukupno</div>
      <div class="total-amount" id="totalAmount">0 <span>EUR</span></div>
    </div>
  </div>
  <div class="month-nav">
    <button class="month-btn" onclick="changeMonth(-1)">‹</button>
    <span class="current-month" id="currentMonth"></span>
    <button class="month-btn" onclick="changeMonth(1)">›</button>
  </div>
</div>

<div class="sync-bar">
  <div class="sync-dot loading" id="syncDot"></div>
  <span id="syncText">Spajanje...</span>
</div>

<div class="summary-scroll" id="catPills"></div>

<div id="viewTransakcije" class="view active">
  <div id="expenseList"></div>
</div>

<div id="viewStatistike" class="view">
  <div class="stats-view" id="statsContent"></div>
</div>

<button class="fab" onclick="openModal()">+</button>

<nav class="bottom-nav">
  <button class="nav-item active" id="navTransakcije" onclick="switchView('Transakcije')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    Troškovi
  </button>
  <button class="nav-item" id="navStatistike" onclick="switchView('Statistike')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 17v-4M12 17v-7M16 17v-2"/></svg>
    Statistike
  </button>
</nav>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Novi trošak</div>

    <div class="form-group">
      <label class="form-label">Opis</label>
      <input class="form-input" id="inputDesc" type="text" placeholder="npr. Kaufland tjedna kupovina" autocomplete="off">
    </div>

    <div class="form-group">
      <label class="form-label">Iznos</label>
      <div class="amount-row">
        <input class="form-input" id="inputAmount" type="number" inputmode="decimal" placeholder="0.00" step="0.01" min="0">
        <div class="currency-badge">EUR</div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Tko je platio</label>
      <div class="who-row">
        <button class="who-btn active" id="whoMatej" onclick="selectWho('Matej')">🧔 Matej</button>
        <button class="who-btn" id="whoMartina" onclick="selectWho('Martina')">👩 Martina</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Kategorija</label>
      <div class="cat-grid" id="catGrid"></div>
    </div>

    <div class="form-group">
      <label class="form-label">Datum</label>
      <input class="form-input" id="inputDate" type="date">
    </div>

    <button class="submit-btn" id="submitBtn" onclick="addExpense()">Dodaj trošak</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbygzn4GanGvaeyu_mQHOOTOqJgrvDnEJ2ZqX0qBz9SVZlDRVgkpWiVDbZddSD9H_Jx7/exec';
const SHEET_ID = '1_HM6gqSf3EoTCkLbMUgl5dvIT13oUYSHwjcaziDuSd8';

const CATEGORIES = [
  { id: 'hrana',     name: 'Hrana',      icon: '🛒', color: '#4ecca3' },
  { id: 'shopping',  name: 'Shopping',   icon: '🛍️', color: '#f7b731' },
  { id: 'rezije',    name: 'Režije',     icon: '💡', color: '#45aaf2' },
  { id: 'kredit',    name: 'Kredit',     icon: '🏦', color: '#fd9644' },
  { id: 'gorivo',    name: 'Gorivo',     icon: '⛽', color: '#a55eea' },
  { id: 'restoran',  name: 'Restoran',   icon: '🍽️', color: '#fc5c65' },
  { id: 'alat',      name: 'Alat',       icon: '🔧', color: '#778ca3' },
  { id: 'djeca',     name: 'Djeca',      icon: '🧒', color: '#26de81' },
  { id: 'zdravlje',  name: 'Zdravlje',   icon: '💊', color: '#ff6b81' },
  { id: 'auto',      name: 'Auto',       icon: '🚗', color: '#a29bfe' },
  { id: 'putovanje', name: 'Putovanje',  icon: '✈️', color: '#00cec9' },
  { id: 'luksuz',    name: 'Luksuz',     icon: '💎', color: '#e17055' },
  { id: 'svatovi',   name: 'Svatovi',    icon: '💍', color: '#fd79a8' },
  { id: 'kuca',      name: 'Kuća',       icon: '🏠', color: '#55efc4' },
  { id: 'zabava',    name: 'Zabava',     icon: '🎉', color: '#fdcb6e' },
  { id: 'materijal', name: 'Materijal',  icon: '🧱', color: '#b8860b' },
  { id: 'majstor',   name: 'Majstor',    icon: '👷', color: '#cd853f' },
  { id: 'ostalo',    name: 'Ostalo',     icon: '📦', color: '#636e72' },
];

let expenses = [];
let selectedCat = null;
let selectedWho = 'Matej';
let filterCat = null;
let currentDate = new Date();
let currentView = 'Transakcije';
let syncInterval = null;

const MONTHS = ['Siječanj','Veljača','Ožujak','Travanj','Svibanj','Lipanj','Srpanj','Kolovoz','Rujan','Listopad','Studeni','Prosinac'];

// ── SYNC ──────────────────────────────────────────────
function setSyncStatus(state, text) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  dot.className = 'sync-dot ' + state;
  txt.textContent = text;
}

async function fetchExpenses() {
  try {
    setSyncStatus('loading', 'Učitavanje...');
    // Use Google Sheets JSON API - no CORS issues
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=List1`;
    const res = await fetch(url, { cache: 'no-store' });
    const text = await res.text();
    // Google wraps response in /*O_o*/google.visualization.Query.setResponse(...)
    const json = JSON.parse(text.substring(47, text.length - 2));
    const rows = json.table.rows || [];
    expenses = rows.map(r => {
      const c = r.c;
      return {
        id: String(c[0] ? c[0].v : ''),
        desc: c[1] ? String(c[1].v || '') : '',
        amount: c[2] ? (parseFloat(c[2].v) || 0) : 0,
        category: c[3] ? String(c[3].v || '') : '',
        who: c[4] ? String(c[4].v || '') : '',
        date: c[5] ? String(c[5].v || '') : ''
      };
    }).filter(r => r.id);
    const now = new Date();
    setSyncStatus('ok', 'Sinkronizirano ' + now.toLocaleTimeString('hr-HR', {hour:'2-digit',minute:'2-digit'}));
    render();
  } catch(e) {
    console.error(e);
    setSyncStatus('err', 'Greška — provjeri internet');
  }
}

async function pushExpense(expense) {
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({
      action: 'add',
      id: expense.id,
      opis: expense.desc,
      iznos: expense.amount,
      kategorija: expense.category,
      tko: expense.who,
      datum: expense.date
    })
  });
  return res.json();
}

async function pushDelete(id) {
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'delete', id })
  });
  return res.json();
}

// ── RENDER ────────────────────────────────────────────
function getMonthExpenses() {
  return expenses.filter(e => {
    const d = new Date(e.date + 'T00:00:00');
    return d.getMonth() === currentDate.getMonth() && d.getFullYear() === currentDate.getFullYear();
  });
}

function changeMonth(dir) {
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + dir, 1);
  filterCat = null;
  render();
}

function getMonthLabel() {
  return MONTHS[currentDate.getMonth()] + ' ' + currentDate.getFullYear();
}

function formatAmt(n) {
  return n.toLocaleString('hr-HR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function catById(id) { return CATEGORIES.find(c => c.id === id) || CATEGORIES[CATEGORIES.length-1]; }

function render() {
  const ml = getMonthLabel();
  document.getElementById('headerMonth').textContent = ml;
  document.getElementById('currentMonth').textContent = ml;
  const monthExp = getMonthExpenses();
  const total = monthExp.reduce((s, e) => s + e.amount, 0);
  document.getElementById('totalAmount').innerHTML = `${formatAmt(total)} <span>EUR</span>`;
  renderCatPills(monthExp);
  if (currentView === 'Transakcije') renderList(monthExp);
  else renderStats(monthExp);
}

function renderCatPills(monthExp) {
  const pills = document.getElementById('catPills');
  const totals = {};
  monthExp.forEach(e => { totals[e.category] = (totals[e.category] || 0) + e.amount; });
  let html = `<div class="cat-pill ${!filterCat ? 'active' : ''}" onclick="setFilter(null)">
    <span class="cat-pill-icon">📋</span>
    <span class="cat-pill-name">Sve</span>
    <span class="cat-pill-amount">${formatAmt(monthExp.reduce((s,e)=>s+e.amount,0))} €</span>
  </div>`;
  CATEGORIES.filter(c => totals[c.id]).forEach(c => {
    html += `<div class="cat-pill ${filterCat===c.id ? 'active' : ''}" onclick="setFilter('${c.id}')">
      <span class="cat-pill-icon">${c.icon}</span>
      <span class="cat-pill-name">${c.name}</span>
      <span class="cat-pill-amount">${formatAmt(totals[c.id]||0)} €</span>
    </div>`;
  });
  pills.innerHTML = html;
}

function setFilter(cat) { filterCat = cat; render(); }

function renderList(monthExp) {
  const list = document.getElementById('expenseList');
  let filtered = filterCat ? monthExp.filter(e => e.category === filterCat) : monthExp;
  filtered = [...filtered].sort((a,b) => new Date(b.date) - new Date(a.date));
  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">💸</div><div class="empty-text">Nema troškova za ovaj mjesec.<br>Dodaj prvi trošak!</div></div>`;
    return;
  }
  const groups = {};
  filtered.forEach(e => {
    const d = new Date(e.date + 'T00:00:00');
    const key = d.toLocaleDateString('hr-HR', { weekday:'short', day:'numeric', month:'long' });
    if (!groups[key]) groups[key] = [];
    groups[key].push(e);
  });
  let html = '';
  Object.entries(groups).forEach(([date, items]) => {
    const dayTotal = items.reduce((s,e)=>s+e.amount, 0);
    html += `<div class="section-header">${date} — ${formatAmt(dayTotal)} €</div>`;
    items.forEach(e => {
      const cat = catById(e.category);
      html += `<div class="expense-item" id="item-${e.id}" onclick="toggleExpand('${e.id}')">
        <div class="expense-icon" style="background:${cat.color}22">${cat.icon}</div>
        <div class="expense-info">
          <div class="expense-desc">${e.desc || cat.name}</div>
          <div class="expense-meta">${cat.name}</div>
        </div>
        <div class="expense-right">
          <div class="expense-amount">${formatAmt(e.amount)} €</div>
          <div class="expense-who">${e.who}</div>
        </div>
        <button class="delete-btn" onclick="deleteExpense(event,'${e.id}')">✕</button>
      </div>`;
    });
  });
  list.innerHTML = html;
}

function toggleExpand(id) {
  const el = document.getElementById('item-' + id);
  const wasExpanded = el.classList.contains('expanded');
  document.querySelectorAll('.expense-item.expanded').forEach(e => e.classList.remove('expanded'));
  if (!wasExpanded) el.classList.add('expanded');
}

async function deleteExpense(ev, id) {
  ev.stopPropagation();
  if (!confirm('Obrisati ovaj trošak?')) return;
  setSyncStatus('loading', 'Brisanje...');
  try {
    await pushDelete(id);
    await fetchExpenses();
    showToast('✓ Trošak obrisan');
  } catch(e) {
    setSyncStatus('err', 'Greška pri brisanju');
    showToast('⚠️ Greška pri brisanju');
  }
}

function renderStats(monthExp) {
  const stats = document.getElementById('statsContent');
  if (!monthExp.length) {
    stats.innerHTML = `<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-text">Nema podataka za ovaj mjesec.</div></div>`;
    return;
  }
  const total = monthExp.reduce((s,e)=>s+e.amount, 0);
  const matejTotal = monthExp.filter(e=>e.who==='Matej').reduce((s,e)=>s+e.amount,0);
  const martinaTotal = monthExp.filter(e=>e.who==='Martina').reduce((s,e)=>s+e.amount,0);
  const catTotals = {};
  monthExp.forEach(e => { catTotals[e.category] = (catTotals[e.category]||0) + e.amount; });
  const sorted = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
  let html = `<div style="height:12px"></div>`;
  html += `<div class="person-split">
    <div class="split-card">
      <div class="split-name">🧔 Matej</div>
      <div class="split-amount" style="color:#4ecca3">${formatAmt(matejTotal)} €</div>
      <div class="split-pct">${total ? Math.round(matejTotal/total*100) : 0}% ukupno</div>
    </div>
    <div class="split-card">
      <div class="split-name">👩 Martina</div>
      <div class="split-amount" style="color:#fd79a8">${formatAmt(martinaTotal)} €</div>
      <div class="split-pct">${total ? Math.round(martinaTotal/total*100) : 0}% ukupno</div>
    </div>
  </div>`;
  html += `<div class="stats-card">`;
  sorted.forEach(([catId, amt]) => {
    const cat = catById(catId);
    const pct = total ? Math.round(amt/total*100) : 0;
    html += `<div style="margin-bottom:14px">
      <div class="stats-row">
        <div class="stats-cat-name">${cat.icon} ${cat.name}</div>
        <div class="stats-amount">${formatAmt(amt)} €</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${cat.color}"></div></div>
      <div style="font-size:11px;color:var(--muted);margin-top:3px">${pct}% ukupnih troškova</div>
    </div>`;
  });
  html += `</div>`;
  stats.innerHTML = html;
}

// ── MODAL ─────────────────────────────────────────────
function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('inputDesc').focus();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  selectedCat = null;
  selectedWho = 'Matej';
  document.getElementById('inputDesc').value = '';
  document.getElementById('inputAmount').value = '';
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('submitBtn').textContent = 'Dodaj trošak';
  selectWho('Matej');
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
}

function closeModalOutside(ev) {
  if (ev.target === document.getElementById('modalOverlay')) closeModal();
}

function selectWho(who) {
  selectedWho = who;
  document.getElementById('whoMatej').classList.toggle('active', who==='Matej');
  document.getElementById('whoMartina').classList.toggle('active', who==='Martina');
}

function buildCatGrid() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = CATEGORIES.map(c =>
    `<div class="cat-btn" id="catbtn-${c.id}" onclick="selectCat('${c.id}')">
      <span class="cat-btn-icon">${c.icon}</span>
      <span class="cat-btn-name">${c.name}</span>
    </div>`
  ).join('');
}

function selectCat(id) {
  selectedCat = id;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('catbtn-' + id).classList.add('selected');
}

async function addExpense() {
  const desc = document.getElementById('inputDesc').value.trim();
  const amount = parseFloat(document.getElementById('inputAmount').value);
  const date = document.getElementById('inputDate').value;
  if (!amount || amount <= 0) { showToast('⚠️ Unesi iznos!'); return; }
  if (!selectedCat) { showToast('⚠️ Odaberi kategoriju!'); return; }
  if (!date) { showToast('⚠️ Odaberi datum!'); return; }

  const cat = catById(selectedCat);
  const expense = {
    id: Date.now().toString(),
    desc: desc || cat.name,
    amount,
    category: selectedCat,
    who: selectedWho,
    date
  };

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Spremanje...';
  setSyncStatus('loading', 'Spremanje...');

  try {
    await pushExpense(expense);
    closeModal();
    await fetchExpenses();
    showToast('✓ Trošak dodan!');
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Dodaj trošak';
    setSyncStatus('err', 'Greška pri spremanju');
    showToast('⚠️ Greška — provjeri internet');
  }
}

function switchView(view) {
  currentView = view;
  document.getElementById('viewTransakcije').classList.toggle('active', view==='Transakcije');
  document.getElementById('viewStatistike').classList.toggle('active', view==='Statistike');
  document.getElementById('navTransakcije').classList.toggle('active', view==='Transakcije');
  document.getElementById('navStatistike').classList.toggle('active', view==='Statistike');
  render();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ──────────────────────────────────────────────
buildCatGrid();
fetchExpenses();
// Auto-refresh svakih 30 sekundi
syncInterval = setInterval(fetchExpenses, 30000);
// Refresh kad se vrati u app (npr. iz backgrounda)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') fetchExpenses();
});
</script>
